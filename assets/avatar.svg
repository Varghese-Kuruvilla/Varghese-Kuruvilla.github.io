<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" rx="30" fill="url(#bgGrad)"/>
  
  <!-- Outer Rotating Rings -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="10 15" opacity="0.3"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="url(#ringGrad)" stroke-width="1" stroke-dasharray="40 10" opacity="0.5"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.7" filter="url(#glow)"/>
  
  <!-- Central Neural Network Nodes -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.4">
    <line x1="200" y1="130" x2="140" y2="180" />
    <line x1="200" y1="130" x2="260" y2="180" />
    <line x1="140" y1="180" x2="160" y2="260" />
    <line x1="260" y1="180" x2="240" y2="260" />
    <line x1="160" y1="260" x2="200" y2="280" />
    <line x1="240" y1="260" x2="200" y2="280" />
    <line x1="200" y1="130" x2="200" y2="210" />
    <line x1="140" y1="180" x2="200" y2="210" />
    <line x1="260" y1="180" x2="200" y2="210" />
    <line x1="160" y1="260" x2="200" y2="210" />
    <line x1="240" y1="260" x2="200" y2="210" />
    <line x1="200" y1="280" x2="200" y2="210" />
  </g>
  
  <!-- Glowing Nodes -->
  <!-- Top -->
  <circle cx="200" cy="130" r="8" fill="url(#glowGrad)" filter="url(#glow)"/>
  <circle cx="200" cy="130" r="4" fill="#ffffff"/>
  
  <!-- Left -->
  <circle cx="140" cy="180" r="8" fill="url(#glowGrad)" filter="url(#glow)"/>
  <circle cx="140" cy="180" r="4" fill="#ffffff"/>
  
  <!-- Right -->
  <circle cx="260" cy="180" r="8" fill="url(#glowGrad)" filter="url(#glow)"/>
  <circle cx="260" cy="180" r="4" fill="#ffffff"/>
  
  <!-- Bottom Left -->
  <circle cx="160" cy="260" r="8" fill="url(#glowGrad)" filter="url(#glow)"/>
  <circle cx="160" cy="260" r="4" fill="#ffffff"/>
  
  <!-- Bottom Right -->
  <circle cx="240" cy="260" r="8" fill="url(#glowGrad)" filter="url(#glow)"/>
  <circle cx="240" cy="260" r="4" fill="#ffffff"/>
  
  <!-- Center (Generative Focus) -->
  <circle cx="200" cy="210" r="12" fill="url(#glowGrad)" filter="url(#glow)"/>
  <circle cx="200" cy="210" r="6" fill="#ffffff"/>
  
  <!-- Bottom Center -->
  <circle cx="200" cy="280" r="8" fill="url(#glowGrad)" filter="url(#glow)"/>
  <circle cx="200" cy="280" r="4" fill="#ffffff"/>
</svg>
